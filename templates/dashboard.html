<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Ultimate Bot - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .logo { font-size: 24px; font-weight: 700; color: #00d4ff; }
        .status-badge {
            padding: 8px 16px; border-radius: 20px; font-size: 12px;
            font-weight: 600; text-transform: uppercase;
        }
        .status-running { background: #00c853; color: #fff; }
        .status-stopped { background: #ff5252; color: #fff; }

        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05); border-radius: 16px;
            padding: 24px; border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-label { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        .stat-value { font-size: 32px; font-weight: 700; }
        .stat-change { font-size: 12px; margin-top: 8px; }
        .positive { color: #00c853; }
        .negative { color: #ff5252; }

        /* Sentiment Card */
        .sentiment-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px; padding: 24px; text-align: center;
        }
        .sentiment-value { font-size: 48px; font-weight: 700; }
        .sentiment-label { font-size: 14px; opacity: 0.8; margin-top: 8px; }

        /* Market Grid */
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .market-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
        }
        .market-card {
            background: rgba(255,255,255,0.05); border-radius: 12px;
            padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .market-card:hover { transform: translateY(-4px); border-color: #00d4ff; }
        .market-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .market-coin { font-size: 18px; font-weight: 600; }
        .market-tf { font-size: 12px; color: #888; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; }
        .market-prices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .price-item { text-align: center; }
        .price-label { font-size: 10px; color: #888; margin-bottom: 4px; }
        .price-value { font-size: 20px; font-weight: 600; }
        .price-up { color: #00c853; }
        .price-down { color: #ff5252; }

        /* Signal Indicator */
        .signal-indicator {
            margin-top: 12px; padding: 8px; border-radius: 8px;
            text-align: center; font-size: 12px; font-weight: 600;
        }
        .signal-bullish { background: rgba(0,200,83,0.2); color: #00c853; }
        .signal-bearish { background: rgba(255,82,82,0.2); color: #ff5252; }
        .signal-neutral { background: rgba(255,255,255,0.1); color: #888; }

        /* Positions Table */
        .positions-section { margin-top: 30px; }
        .positions-table {
            width: 100%; border-collapse: collapse;
            background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden;
        }
        .positions-table th, .positions-table td {
            padding: 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .positions-table th { background: rgba(255,255,255,0.1); font-weight: 600; font-size: 12px; text-transform: uppercase; }

        /* WS Status */
        .ws-status {
            display: flex; gap: 20px; margin-top: 20px;
            padding: 16px; background: rgba(255,255,255,0.05); border-radius: 12px;
        }
        .ws-item { display: flex; align-items: center; gap: 8px; }
        .ws-dot { width: 8px; height: 8px; border-radius: 50%; }
        .ws-connected { background: #00c853; box-shadow: 0 0 8px #00c853; }
        .ws-disconnected { background: #ff5252; box-shadow: 0 0 8px #ff5252; }

        /* Animations */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse { animation: pulse 2s infinite; }

        /* Responsive */
        @media (max-width: 1200px) { .market-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) { .market-grid { grid-template-columns: repeat(2, 1fr); } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .market-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">Polymarket Ultimate Bot</div>
            <div>
                <span class="status-badge status-running" id="status-badge">RUNNING</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total PnL</div>
                <div class="stat-value" id="total-pnl">$0.00</div>
                <div class="stat-change positive" id="pnl-change">+0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Trades</div>
                <div class="stat-value" id="total-trades">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value" id="win-rate">0%</div>
            </div>
            <div class="stat-card sentiment-card">
                <div class="stat-label">Fear & Greed Index</div>
                <div class="sentiment-value" id="fear-greed">50</div>
                <div class="sentiment-label" id="sentiment-label">Neutral</div>
            </div>
        </div>

        <!-- Markets -->
        <div class="section-title">Markets</div>
        <div class="market-grid" id="market-grid">
            <!-- Markets will be populated by JS -->
        </div>

        <!-- Positions -->
        <div class="positions-section">
            <div class="section-title">Open Positions</div>
            <table class="positions-table">
                <thead>
                    <tr>
                        <th>Market</th>
                        <th>Direction</th>
                        <th>Entry</th>
                        <th>Current</th>
                        <th>PnL</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="positions-body">
                    <tr><td colspan="6" style="text-align:center;color:#888;">No open positions</td></tr>
                </tbody>
            </table>
        </div>

        <!-- WS Status -->
        <div class="ws-status">
            <div class="ws-item">
                <div class="ws-dot ws-disconnected" id="poly-ws-dot"></div>
                <span>Polymarket WS: <span id="poly-ws-status">Disconnected</span></span>
            </div>
            <div class="ws-item">
                <div class="ws-dot ws-disconnected" id="binance-ws-dot"></div>
                <span>Binance WS: <span id="binance-ws-status">Disconnected</span></span>
            </div>
            <div class="ws-item" style="margin-left:auto;">
                <span>Last Update: <span id="last-update">-</span></span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.0/socket.io.min.js"></script>
    <script>
        const socket = io();

        // State
        let markets = {};
        let signals = {};
        let positions = {};

        // Connect
        socket.on('connect', () => {
            console.log('Connected to dashboard');
            socket.emit('request_state');
        });

        // Full state update
        socket.on('full_state', (state) => {
            markets = state.markets || {};
            signals = state.signals || {};
            positions = state.positions || {};

            updateUI(state);
        });

        // Individual updates
        socket.on('market_update', (data) => {
            markets[`${data.coin}_${data.timeframe}`] = data;
            renderMarkets();
        });

        socket.on('signal_update', (data) => {
            signals[`${data.coin}_${data.timeframe}`] = data;
            renderMarkets();
        });

        socket.on('pnl_update', (data) => {
            document.getElementById('total-pnl').textContent = `$${data.total.toFixed(2)}`;
            document.getElementById('total-trades').textContent = data.trades;
            document.getElementById('win-rate').textContent = `${(data.win_rate * 100).toFixed(1)}%`;
        });

        socket.on('sentiment_update', (data) => {
            document.getElementById('fear-greed').textContent = data.fear_greed_index;
            document.getElementById('sentiment-label').textContent = data.label;
        });

        function updateUI(state) {
            // PnL
            const pnl = state.pnl || {};
            document.getElementById('total-pnl').textContent = `$${(pnl.total || 0).toFixed(2)}`;
            document.getElementById('total-trades').textContent = pnl.trades || 0;
            document.getElementById('win-rate').textContent = `${((pnl.win_rate || 0) * 100).toFixed(1)}%`;

            // Sentiment
            const sentiment = state.sentiment || {};
            document.getElementById('fear-greed').textContent = sentiment.fear_greed_index || 50;
            document.getElementById('sentiment-label').textContent = sentiment.label || 'Neutral';

            // System
            const system = state.system || {};
            updateWSStatus('poly', system.polymarket_ws || 'disconnected');
            updateWSStatus('binance', system.binance_ws || 'disconnected');
            document.getElementById('last-update').textContent = system.last_update ? formatTime(system.last_update) : '-';

            // Markets
            renderMarkets();

            // Positions
            renderPositions();
        }

        function renderMarkets() {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';

            const keys = Object.keys(markets).sort();

            for (const key of keys) {
                const market = markets[key];
                const signal = signals[key] || {};

                const card = document.createElement('div');
                card.className = 'market-card';

                const signalClass = signal.direction === 'BULLISH' ? 'signal-bullish' :
                                   signal.direction === 'BEARISH' ? 'signal-bearish' : 'signal-neutral';

                card.innerHTML = `
                    <div class="market-header">
                        <div class="market-coin">${market.coin}</div>
                        <div class="market-tf">${market.timeframe}</div>
                    </div>
                    <div class="market-prices">
                        <div class="price-item">
                            <div class="price-label">UP</div>
                            <div class="price-value price-up">${(market.up_price || 0).toFixed(4)}</div>
                        </div>
                        <div class="price-item">
                            <div class="price-label">DOWN</div>
                            <div class="price-value price-down">${(market.down_price || 0).toFixed(4)}</div>
                        </div>
                    </div>
                    <div class="signal-indicator ${signalClass}">
                        ${signal.direction || 'NEUTRAL'} (${signal.score || 50})
                    </div>
                `;

                grid.appendChild(card);
            }

            if (keys.length === 0) {
                grid.innerHTML = '<div style="text-align:center;color:#888;padding:40px;">Waiting for market data...</div>';
            }
        }

        function renderPositions() {
            const tbody = document.getElementById('positions-body');
            const keys = Object.keys(positions);

            if (keys.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;">No open positions</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            for (const key of keys) {
                const pos = positions[key];
                const pnl = pos.pnl || 0;
                const pnlClass = pnl >= 0 ? 'positive' : 'negative';

                tbody.innerHTML += `
                    <tr>
                        <td>${pos.coin} ${pos.timeframe}</td>
                        <td>${pos.direction}</td>
                        <td>${pos.entry_price?.toFixed(4) || '-'}</td>
                        <td>${pos.current_price?.toFixed(4) || '-'}</td>
                        <td class="${pnlClass}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</td>
                        <td>OPEN</td>
                    </tr>
                `;
            }
        }

        function updateWSStatus(type, status) {
            const dot = document.getElementById(`${type}-ws-dot`);
            const text = document.getElementById(`${type}-ws-status`);

            if (status === 'connected') {
                dot.className = 'ws-dot ws-connected';
                text.textContent = 'Connected';
            } else {
                dot.className = 'ws-dot ws-disconnected';
                text.textContent = 'Disconnected';
            }
        }

        function formatTime(iso) {
            try {
                return new Date(iso).toLocaleTimeString();
            } catch {
                return iso;
            }
        }

        // Poll for updates every 5 seconds
        setInterval(() => {
            fetch('/api/state')
                .then(r => r.json())
                .then(updateUI)
                .catch(console.error);
        }, 5000);
    </script>
</body>
</html>
